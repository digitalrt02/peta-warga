<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Peta Warga RT.02 Padasuka Cimahi</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/4.6.2/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" />
    
    <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />
    <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>

    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; }
        #map-canvas { height: 100vh; width: 100%; }
        
        /* Gaya Tampilan Pop-up Profil */
        .custom-popup { width: 190px; text-align: center; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 5px; }
        .popup-photo img { width: 100%; height: 180px; object-fit: cover; border-radius: 12px; border: 3px solid #009cdc; margin-bottom: 8px; background-color: #f8f9fa; }
        .popup-lokasi { font-size: 11px; color: #6c757d; margin-top: 3px; }
        
        /* Tombol Navigasi / Instruksi 3D */
        .instruction-3d {
            position: absolute; bottom: 20px; right: 20px; z-index: 1000;
            background: rgba(0, 0, 0, 0.75); color: #fff; padding: 10px 15px;
            border-radius: 30px; font-size: 12px; pointer-events: none;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

<section class="page" id="list-page-mahasiswa">
    <div class="container-fluid p-0" style="position: relative;">
        
        <div id="map-canvas"></div>

        <div class="map-header-no-card" style="position: absolute; top: 15px; left: 20px; right: 20px; z-index: 1000;">
            <div class="row align-items-center">
                <div class="col-md-12">
                    <h6 class="m-0 font-weight-bold" style="color: #2d3436; text-shadow: 1px 1px 4px white; font-size: 1.1rem;">
                        <i class="fa fa-map-marked-alt mr-2" style="color: #009cdc;"></i> Peta Warga RT.02 Padasuka Cimahi
                    </h6>
                </div>
            </div>
        </div>

        <div class="map-overlay-top-left" style="position: absolute; top: 70px; left: 20px; z-index: 1000; background: rgba(255,255,255,0.8); padding: 12px; border-radius: 20px; backdrop-filter: blur(5px); box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 160px;">
            <a class="btn btn-outline-danger btn-sm btn-block rounded-pill shadow-sm font-weight-bold mb-2" href="https://wa.me/6281387244753" target="_blank">
                <i class="fa fa-info-circle mr-1"></i> Salah Data?
            </a>
            <a class="btn btn-success btn-sm btn-block rounded-pill shadow-sm font-weight-bold" href="https://script.google.com/macros/s/AKfycbyQVHEeS3F1_1pcsatTnz6kwnTojXlLyrUdF0--oyUU_5FoOA47Dxk8avVP6nMYMIPJ/exec" target="_blank">
                <i class="fa fa-file-signature mr-1"></i> Daftar Baru
            </a>
        </div>

        <div class="instruction-3d">
            <i class="fa fa-compass mr-1"></i> Tahan <strong>Klik Kanan + Geser Mouse</strong> untuk merotasi sudut pandang 3D
        </div>
    </div>
</section>

<script>
document.addEventListener("DOMContentLoaded", function() {
    
    var map = new maplibregl.Map({
        container: 'map-canvas',
        style: {
            'version': 8,
            'sources': {
                'satelit-bersih': {
                    'type': 'raster',
                    'tiles': [
                        'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}'
                    ],
                    'tileSize': 256,
                    'attribution': '© Esri World Imagery'
                }
            },
            'layers': [
                { 
                    'id': 'satelit-layer', 
                    'type': 'raster', 
                    'source': 'satelit-bersih', 
                    'minzoom': 0, 
                    'maxzoom': 24 
                }
            ]
        },
        center: [107.5279, -6.8744], 
        zoom: 14,
        maxZoom: 20,              
        pitch: 60,                  
        bearing: -10,               
        antialias: true
    });

    map.addControl(new maplibregl.NavigationControl(), 'top-right');

    var urlAPI = "https://script.google.com/macros/s/AKfycbyQVHEeS3F1_1pcsatTnz6kwnTojXlLyrUdF0--oyUU_5FoOA47Dxk8avVP6nMYMIPJ/exec?action=read";

    map.on('load', function() {
        fetch(urlAPI)
            .then(response => response.json())
            .then(records => {
                var bounds = new maplibregl.LngLatBounds();
                var hasValidData = false;

                records.forEach(function(data) {
                    var strLat = String(data.latitude || "").trim();
                    var strLng = String(data.longitude || "").trim();
                    
                    if ((strLat.match(/\./g) || []).length > 1) {
                        strLat = strLat.replace(/\./g, ''); 
                        strLat = strLat.slice(0, 2) + '.' + strLat.slice(2); 
                    } else if (!strLat.includes('.') && strLat.length > 3) {
                        strLat = strLat.slice(0, 2) + '.' + strLat.slice(2);
                    }

                    if ((strLng.match(/\./g) || []).length > 1) {
                        strLng = strLng.replace(/\./g, '');
                        if (strLng.startsWith('10')) {
                            strLng = strLng.slice(0, 3) + '.' + strLng.slice(3);
                        } else {
                            strLng = strLng.slice(0, 2) + '.' + strLng.slice(2);
                        }
                    } else if (!strLng.includes('.') && strLng.length > 4) {
                        if (strLng.startsWith('10')) {
                            strLng = strLng.slice(0, 3) + '.' + strLng.slice(3);
                        } else {
                            strLng = strLng.slice(0, 2) + '.' + strLng.slice(2);
                        }
                    }
                    
                    var lat = parseFloat(strLat);
                    var lng = parseFloat(strLng);
                    
                    if (!isNaN(lat) && !isNaN(lng) && lat < -5.5 && lat > -8.0 && lng > 105.0 && lng < 109.5) {
                        var urlFoto = data.photo || data.foto || "";
                        
                        var avatarDefault = "https://cdnjs.cloudflare.com/ajax/libs/admin-lte/3.2.0/img/avatar5.png";
                        var img_src = avatarDefault;
                        
                        if (urlFoto && !urlFoto.includes("Gagal") && urlFoto.includes("drive.google.com")) {
                            var fileId = "";
                            if (urlFoto.includes("id=")) {
                                fileId = urlFoto.split("id=")[1].split("&")[0];
                            } else if (urlFoto.includes("/file/d/")) {
                                fileId = urlFoto.split("/file/d/")[1].split("/")[0];
                            }
                            if (fileId) {
                                img_src = "https://lh3.googleusercontent.com/d/" + fileId;
                            }
                        } else if (urlFoto && !urlFoto.includes("Gagal") && urlFoto.includes("http")) {
                            img_src = urlFoto;
                        }
                            
                        var photo_output = `<div class="popup-photo">
                            <img src="${img_src}" onerror="this.onerror=null; this.src='${avatarDefault}';">
                        </div>`;

                        var content = `
                            <div class="custom-popup">
                                ${photo_output}
                                <h6 class="mb-1 font-weight-bold" style="color:#2c3e50; font-size:14px;">${data.nama_lengkap}</h6>
                                <p class="popup-lokasi mb-0">
                                    <i class="fa fa-map-marker-alt text-danger mr-1"></i> ${data.kota}, ${data.provinsi}
                                </p>
                            </div>`;

                        var popup = new maplibregl.Popup({ offset: 25, closeButton: true });
                        popup.setHTML(content);

                        new maplibregl.Marker({ color: '#009cdc' })
                            .setLngLat([lng, lat])
                            .setPopup(popup)
                            .addTo(map);

                        bounds.extend([lng, lat]);
                        hasValidData = true;
                    }
                });

                if (hasValidData) {
                    map.fitBounds(bounds, { padding: 80, maxZoom: 16 });
                }
            })
            .catch(error => console.error('Gagal mengambil data dari Google Sheets Web API:', error));
    });
});
</script>

</body>
</html>
